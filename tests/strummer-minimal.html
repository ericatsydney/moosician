<!doctype html>
<html><head><meta charset="utf-8"><title>Minimal Test</title>
<style>
.strum-note-btn { width:60px;height:60px;border:1px solid #555;cursor:pointer;font-size:20px;background:#222;color:#aaa; }
.strum-note-btn[data-strum="up"] { background: #0a4; color:#fff; }
.strum-note-btn[data-strum="down"] { background: #b80; color:#fff; }
.strum-note-btn[data-strum="mute"] { background:#333; color:#555; }
</style>
</head><body>
<h1>Minimal Strummer</h1>
<input id="metronome-rpm" type="number" value="120">
<div>
  <button class="strum-note-btn" data-strum="down">&#9660;</button>
  <button class="strum-note-btn" data-strum="down">&#9660;</button>
  <button class="strum-note-btn" data-strum="up">&#9652;</button>
  <button class="strum-note-btn" data-strum="up">&#9652;</button>
  <button class="strum-note-btn" data-strum="down">&#9660;</button>
  <button class="strum-note-btn" data-strum="up">&#9652;</button>
  <button class="strum-note-btn" data-strum="down">&#9660;</button>
  <button class="strum-note-btn" data-strum="up">&#9652;</button>
</div>
<br>
<button id="strum-toggle">Start</button>
<div id="strum-status">Ready</div>
<script>
// Direct copy of the strummer.js logic (bindAndInit only, no waitForAppReady)
var metronomeRpmInput = document.getElementById("metronome-rpm");
var toggleBtn = document.getElementById("strum-toggle");
var statusEl = document.getElementById("strum-status");
var noteBtns = Array.from(document.querySelectorAll(".strum-note-btn"));
var defaultPattern = ["down","down","up","up","down","up","down","up"];
var isRunning = false;
var audioCtx = null;
var tempo = 120;

function initAudio(){ if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

// Restore pattern
try{
  var saved = localStorage.getItem("strummer-pattern");
  if(saved){
    var arr = JSON.parse(saved);
    if(Array.isArray(arr) && arr.length === 8){
      arr.forEach(function(dir, i){
        if(i < noteBtns.length){
          noteBtns[i].dataset.strum = dir;
          if(dir === "up") noteBtns[i].textContent = "\u25B2";
          else if(dir === "down") noteBtns[i].textContent = "\u25BC";
          else noteBtns[i].textContent = "\u2014";
        }
      });
    }
  }
}catch(e){}

// Toggle
noteBtns.forEach(function(btn){
  btn.addEventListener("click", function(){
    if(isRunning) return;
    var cur = this.dataset.strum || defaultPattern[noteBtns.indexOf(this)];
    var next;
    if(cur === "down") next = "up";
    else if(cur === "up") next = "mute";
    else next = "down";
    this.dataset.strum = next;
    if(next === "up") this.textContent = "\u25B2";
    else if(next === "down") this.textContent = "\u25BC";
    else this.textContent = "\u2014";
    statusEl.textContent = "Toggled: " + next;
    var pat = noteBtns.map(function(b){ return b.dataset.strum; });
    try{ localStorage.setItem("strummer-pattern", JSON.stringify(pat)); }catch(e){}
  });
});

// Init display
noteBtns.forEach(function(btn, i){
  if(!btn.dataset.strum) btn.dataset.strum = defaultPattern[i];
});

// Toggle start/stop
toggleBtn.addEventListener("click", function(){
  if(isRunning){
    isRunning = false;
    toggleBtn.textContent = "Start";
    statusEl.textContent = "Stopped";
    return;
  }
  initAudio();
  tempo = Number(metronomeRpmInput.value) || 120;
  audioCtx.resume().then(function(){
    isRunning = true;
    toggleBtn.textContent = "Stop";
    statusEl.textContent = "Playing at " + tempo + " BPM";
  });
});

statusEl.textContent = "Initialized OK. Click a note button.";
</script>
</body></html>
